name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Biome
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.22
      - run: bun install --frozen-lockfile
      - run: bun run biome check .

  typecheck:
    name: TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.22
      - run: bun install --frozen-lockfile
      - run: bun run tsc --build

  test:
    name: Bun Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.22
      - run: bun install --frozen-lockfile
      - run: bun test

  build-binary:
    name: Compile (${{ matrix.target }})
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test]
    strategy:
      fail-fast: false
      matrix:
        target:
          - bun-darwin-arm64
          - bun-darwin-x64
          - bun-linux-x64
          - bun-linux-arm64
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.22
      - run: bun install --frozen-lockfile
      - name: Compile prove binary
        run: |
          mkdir -p dist-bin
          bun build --compile \
            --target=${{ matrix.target }} \
            --outfile dist-bin/prove-${{ matrix.target }} \
            packages/cli/bin/run.ts
      - name: Smoke test binary (linux-x64 only)
        if: matrix.target == 'bun-linux-x64'
        run: |
          chmod +x dist-bin/prove-${{ matrix.target }}
          ./dist-bin/prove-${{ matrix.target }} --help
      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: prove-${{ matrix.target }}
          path: dist-bin/prove-${{ matrix.target }}
          retention-days: 14
          if-no-files-found: error
