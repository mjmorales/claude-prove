name: Release

on:
  push:
    branches: [main]
    # The review UI ships its server in-process under the native daemon, not
    # as a separately-versioned plugin artifact. Pushes that only touch
    # review-ui files should not cut a new plugin release.
    paths-ignore:
      - 'packages/review-ui/**'

permissions:
  contents: write

jobs:
  release:
    # Cut a new version + tag on pushes to main.
    runs-on: ubuntu-latest
    outputs:
      skip: ${{ steps.bump.outputs.skip }}
      new_version: ${{ steps.bump.outputs.new_version }}
    steps:
      - name: Generate App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}

      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0  # Full history for tag detection
          token: ${{ steps.app-token.outputs.token }}

      - name: Determine version bump
        id: bump
        run: |
          # plugin.json is the authoritative current version. Tags are
          # used only to pick the commit range for the changelog —
          # hand-rolled chore(release) commits that weren't tagged would
          # otherwise cause the tag-based lookup to silently revert
          # plugin.json to an older version.
          CURRENT=$(grep '"version"' .claude-plugin/plugin.json | head -1 | sed 's/.*"version": "\([^"]*\)".*/\1/')

          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          if [ "$LATEST_TAG" = "v0.0.0" ]; then
            echo "No tags found. Using plugin.json version ($CURRENT) as base; changelog range = HEAD."
          fi

          echo "latest_tag=$LATEST_TAG" >> "$GITHUB_OUTPUT"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"

          # Analyze commits since last tag, EXCLUDING commits that only touch
          # the review UI — it ships in-process under the native daemon and is
          # not a separately-versioned plugin artifact. `:(exclude)` pathspec
          # filters out commits that changed only packages/review-ui/.
          # CLAUDE.md is excluded too: its managed block pins the plugin
          # version, so each release requires a docs sync commit — counting
          # that commit as release-relevant would cut another release and
          # stale the pin again, forever.
          EXCLUDES=(':(exclude)packages/review-ui' ':(exclude)CLAUDE.md')
          if [ "$LATEST_TAG" = "v0.0.0" ]; then
            COMMITS=$(git log --pretty=format:"%s%n%b" HEAD -- . "${EXCLUDES[@]}")
          else
            COMMITS=$(git log --pretty=format:"%s%n%b" "${LATEST_TAG}..HEAD" -- . "${EXCLUDES[@]}")
          fi

          if [ -z "$COMMITS" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Determine bump type from conventional commits
          BUMP="none"

          if echo "$COMMITS" | grep -qiE "^[a-z]+(\(.+\))?!:|BREAKING CHANGE:"; then
            BUMP="major"
          elif echo "$COMMITS" | grep -qE "^feat(\(.+\))?:"; then
            BUMP="minor"
          elif echo "$COMMITS" | grep -qE "^(fix|docs|refactor|perf|style|build)(\(.+\))?:"; then
            BUMP="patch"
          fi

          if [ "$BUMP" = "none" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Calculate new version
          case "$BUMP" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac

          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          echo "new_version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "bump=$BUMP" >> "$GITHUB_OUTPUT"
          echo "skip=false" >> "$GITHUB_OUTPUT"
          echo "Bump: $BUMP ($CURRENT -> $NEW_VERSION)"

      - name: Generate changelog
        id: changelog
        if: steps.bump.outputs.skip != 'true'
        run: |
          LATEST_TAG="${{ steps.bump.outputs.latest_tag }}"
          NEW_VERSION="${{ steps.bump.outputs.new_version }}"

          if [ "$LATEST_TAG" = "v0.0.0" ]; then
            RANGE="HEAD"
          else
            RANGE="${LATEST_TAG}..HEAD"
          fi

          # Match the bump step: keep review-ui commits out of the plugin
          # CHANGELOG (it ships in-process under the native daemon, not as a
          # separately-versioned artifact) and CLAUDE.md version-pin syncs
          # out of release-relevance.
          EXCLUDES=(':(exclude)packages/review-ui' ':(exclude)CLAUDE.md')

          {
            echo "changelog<<CHANGELOG_EOF"

            # Breaking changes
            BREAKING=$(git log --pretty=format:"%s" "$RANGE" -- . "${EXCLUDES[@]}" | grep -iE "^[a-z]+(\(.+\))?!:" || true)
            BREAKING_BODY=$(git log --pretty=format:"%b" "$RANGE" -- . "${EXCLUDES[@]}" | grep -A1 "BREAKING CHANGE:" | grep -v "^--$" || true)
            if [ -n "$BREAKING" ] || [ -n "$BREAKING_BODY" ]; then
              echo "### Breaking Changes"
              [ -n "$BREAKING" ] && echo "$BREAKING" | sed 's/^/- /'
              [ -n "$BREAKING_BODY" ] && echo "$BREAKING_BODY" | sed 's/^/- /'
              echo ""
            fi

            # Features
            FEATURES=$(git log --pretty=format:"- %s (%h)" "$RANGE" -- . "${EXCLUDES[@]}" | grep -E "^- feat" || true)
            if [ -n "$FEATURES" ]; then
              echo "### Features"
              echo "$FEATURES"
              echo ""
            fi

            # Fixes
            FIXES=$(git log --pretty=format:"- %s (%h)" "$RANGE" -- . "${EXCLUDES[@]}" | grep -E "^- fix" || true)
            if [ -n "$FIXES" ]; then
              echo "### Fixes"
              echo "$FIXES"
              echo ""
            fi

            # Other changes (docs, refactor, perf, style, build)
            OTHER=$(git log --pretty=format:"- %s (%h)" "$RANGE" -- . "${EXCLUDES[@]}" | grep -E "^- (docs|refactor|perf|style|build)" || true)
            if [ -n "$OTHER" ]; then
              echo "### Other"
              echo "$OTHER"
              echo ""
            fi

            echo "CHANGELOG_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Bump version in plugin files
        if: steps.bump.outputs.skip != 'true'
        run: |
          bash scripts/bump-version.sh "${{ steps.bump.outputs.new_version }}"

      - name: Update CHANGELOG.md
        if: steps.bump.outputs.skip != 'true'
        env:
          # Pass via env instead of `${{ ... }}` shell interpolation so
          # backticks, `$()`, and other shell-active characters in commit
          # subjects are treated as literal text — not command substitutions.
          NEW_VERSION: ${{ steps.bump.outputs.new_version }}
          CHANGELOG: ${{ steps.changelog.outputs.changelog }}
        run: |
          DATE=$(date -u +%Y-%m-%d)

          # Build the new entry
          ENTRY=$(printf "## [%s] - %s\n\n%s\n" "$NEW_VERSION" "$DATE" "$CHANGELOG")

          # Insert new entry after the header block (line 4 = blank line after header)
          # Find the line number of the first "## [" entry
          INSERT_LINE=$(grep -n "^## \[" CHANGELOG.md | head -1 | cut -d: -f1)

          if [ -n "$INSERT_LINE" ]; then
            # Insert before the first existing entry
            head -n $((INSERT_LINE - 1)) CHANGELOG.md > CHANGELOG.tmp
            echo "$ENTRY" >> CHANGELOG.tmp
            tail -n +${INSERT_LINE} CHANGELOG.md >> CHANGELOG.tmp
          else
            # No existing entries — append after header
            cat CHANGELOG.md > CHANGELOG.tmp
            echo "" >> CHANGELOG.tmp
            echo "$ENTRY" >> CHANGELOG.tmp
          fi

          mv CHANGELOG.tmp CHANGELOG.md

      - name: Stamp UPDATES.md Unreleased sections
        if: steps.bump.outputs.skip != 'true'
        run: |
          NEW_VERSION="${{ steps.bump.outputs.new_version }}"
          # UPDATES.md entries are authored under '## Unreleased — <title>'
          # headings — authors never hand-write a version, because the next
          # semver is unknowable until this job computes the bump. Rewrite the
          # heading prefix only (titles preserved), so every entry pending at
          # release time is stamped with the version that actually ships it.
          # No-op when no Unreleased sections exist.
          sed -i "s/^## Unreleased/## v${NEW_VERSION}/" UPDATES.md

      - name: Commit, tag, and push
        if: steps.bump.outputs.skip != 'true'
        run: |
          NEW_VERSION="${{ steps.bump.outputs.new_version }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .claude-plugin/plugin.json .claude-plugin/marketplace.json packages/cli/package.json CHANGELOG.md UPDATES.md
          # Commit only if files actually changed (version may already match)
          if git diff --cached --quiet; then
            echo "Version files already at $NEW_VERSION, skipping commit."
          else
            git commit -m "chore(release): v${NEW_VERSION} [skip ci]"
          fi
          git tag "v${NEW_VERSION}"
          git push origin main --tags

      - name: Create GitHub Release
        if: steps.bump.outputs.skip != 'true'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ steps.bump.outputs.new_version }}
          name: v${{ steps.bump.outputs.new_version }}
          body: ${{ steps.changelog.outputs.changelog }}
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}

  build-release-binary:
    # Runs immediately after the `release` job in the same workflow. We
    # don't rely on the tag-push event to re-trigger this workflow: the
    # release commit message contains `[skip ci]`, which GitHub honors for
    # both the branch push AND the tag push that points at the same commit,
    # so a tag-trigger approach silently no-ops. Matrix builds a compiled
    # Bun binary for each of the 4 supported targets and uploads each as a
    # named GH Release asset against the tag the release job just cut.
    needs: release
    if: needs.release.outputs.skip != 'true'
    name: Build ${{ matrix.artifact }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # macos-latest is arm64 (Apple Silicon) as of the GH runner
          # images in April 2026.
          - os: macos-latest
            arch: arm64
            target: bun-darwin-arm64
            artifact: claude-prove-darwin-arm64
          # Intel mac (bun-darwin-x64) is intentionally NOT built. The store
          # runs on the @tursodatabase/database NAPI engine, which publishes no
          # Intel-mac binding at the pinned version (no -darwin-x64 package, no
          # -darwin-universal or -wasm32-wasi fallback), so a darwin-x64 binary
          # has no addon to embed and would die on every store command exactly
          # like a binary with the addon missing. Re-add this entry once
          # upstream ships an Intel-mac (or universal/wasm) binding and
          # scripts/gen-native-embed.ts maps the target.
          - os: ubuntu-latest
            arch: x64
            target: bun-linux-x64
            artifact: claude-prove-linux-x64
          # ubuntu-24.04-arm is GH's provided arm64 linux runner. If this
          # label becomes unavailable, fall back to `ubuntu-latest` +
          # QEMU/docker-buildx cross-compilation (see bun-linux-arm64
          # target — bun natively cross-compiles so QEMU is unnecessary
          # for the build step itself, only for smoke-testing).
          - os: ubuntu-24.04-arm
            arch: arm64
            target: bun-linux-arm64
            artifact: claude-prove-linux-arm64
    steps:
      - uses: actions/checkout@v6
        with:
          ref: v${{ needs.release.outputs.new_version }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.22

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Build packages/review-ui/web (vite) and pack web/dist into the tarball
      # run.ts embeds via `type: "file"`, so the compile below bakes the web
      # bundle into the binary. Must run BEFORE the compile step.
      - name: Build + embed review-ui web bundle
        run: ./scripts/build-review-ui-embed.sh

      # `bun build --compile` bundles JavaScript into the executable's embedded
      # filesystem but does NOT carry the external @tursodatabase NAPI .node
      # addon the store depends on — a bare compile therefore ships a binary
      # that throws "Cannot find native binding" before argument parsing, so
      # even --version dies. This step generates a per-target compiled entry
      # that embeds the host's prebuilt addon as a file asset and points the
      # loader at it; the entry is gitignored (release-build artifact only).
      - name: Generate native-addon embed for ${{ matrix.target }}
        run: bun run scripts/gen-native-embed.ts ${{ matrix.target }}

      - name: Compile ${{ matrix.artifact }}
        run: |
          bun build --compile \
            --target=${{ matrix.target }} \
            packages/cli/bin/run.compiled.generated.ts \
            --outfile claude-prove
          mv claude-prove ${{ matrix.artifact }}

      # A compiled binary differs from `bun run` sources in TWO ways the source
      # tree cannot catch: module identity (bunfs maps argv[1] and every bundled
      # module's import.meta.url to one virtual entry) AND native-addon
      # resolution (the @tursodatabase NAPI binding is embedded into the
      # executable, not resolved from node_modules). Both have shipped broken
      # binaries — one that printed its version yet exited 1 on every command,
      # and one that died on every command (including --version) because the
      # native binding wasn't embedded.
      #
      # CRITICAL: run from a directory with NO node_modules. Running the binary
      # in the repo root lets a missing-embed binary "pass" because the build
      # tree's node_modules satisfies the native require — masking exactly the
      # failure users hit in the wild. The clean room makes that impossible.
      # Then exercise the store end-to-end (open DB, migrate, write, read) so a
      # binding that imports but cannot run is also caught. Every matrix host
      # executes its own artifact natively.
      - name: Smoke-test ${{ matrix.artifact }} (clean room)
        run: |
          set -euo pipefail
          SMOKE_DIR="$(mktemp -d)"
          cp "./${{ matrix.artifact }}" "$SMOKE_DIR/claude-prove"
          ( cd "$SMOKE_DIR"
            out=$(./claude-prove --version)
            echo "$out"
            echo "$out" | grep -q "claude-prove/${{ needs.release.outputs.new_version }}"
            git init -q smoke-repo
            cd smoke-repo
            "$SMOKE_DIR/claude-prove" scrum init
            "$SMOKE_DIR/claude-prove" scrum status )

      - name: Upload to GitHub Release
        # `tag_name` is required when the workflow is NOT triggered by a tag
        # push. This matrix runs on the branch-push event that cut the
        # release, so GITHUB_REF is refs/heads/main and the action cannot
        # infer which release to attach assets to — it errors out with
        # "⚠️ GitHub Releases requires a tag". The release job already
        # created the release via the `softprops/action-gh-release` action
        # above, so this call attaches files to the existing release
        # instead of creating a new one.
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ needs.release.outputs.new_version }}
          files: ${{ matrix.artifact }}
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
