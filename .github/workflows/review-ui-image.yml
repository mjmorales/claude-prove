name: Review UI Image

# Release channel for the review UI. Decoupled from the prove plugin release
# (see .github/workflows/release.yml) — review-ui changes publish a Docker
# image to GHCR without bumping the plugin version.

on:
  push:
    branches: [main]
    paths:
      - 'packages/review-ui/**'
      - 'packages/shared/**'
      - 'packages/store/**'
      - 'packages/cli/**'
      - 'packages/installer/**'
      - 'package.json'
      - 'bun.lock'
      - 'tsconfig.base.json'
      - 'tsconfig.json'
      - '.dockerignore'
      - '.github/workflows/review-ui-image.yml'
    tags: ['review-ui-v*']
  pull_request:
    paths:
      - 'packages/review-ui/**'
      - 'packages/shared/**'
      - 'packages/store/**'
      - 'packages/cli/**'
      - 'packages/installer/**'
      - 'package.json'
      - 'bun.lock'
      - 'tsconfig.base.json'
      - 'tsconfig.json'
      - '.dockerignore'
      - '.github/workflows/review-ui-image.yml'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: mjmorales/claude-prove/review-ui

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # for GitHub Release on tag pushes
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-,format=short,enable={{is_default_branch}}
            type=match,pattern=review-ui-v(.*),group=1

      - name: Build and push
        id: build
        uses: docker/build-push-action@v5
        with:
          # Build context is the monorepo root so workspace deps resolve.
          # The Dockerfile lives under packages/review-ui/ per phase 11 task 5.
          context: .
          file: packages/review-ui/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=review-ui
          cache-to: type=gha,scope=review-ui,mode=max

      - name: Create GitHub Release for tag
        if: startsWith(github.ref, 'refs/tags/review-ui-v')
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body: |
            Review UI Docker image.

            **Pull:**
            ```
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version }}
            ```

            **Run:**
            ```
            /prove:review-ui --tag ${{ steps.meta.outputs.version }}
            ```

            **Digest:** `${{ steps.build.outputs.digest }}`
          generate_release_notes: true
