<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ACB Review</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <header id="header">
    <div class="header-left">
      <h1>ACB Review</h1>
      <span id="branch-info" class="badge"></span>
    </div>
    <div class="header-right">
      <div id="progress-bar">
        <div id="progress-fill"></div>
      </div>
      <span id="progress-text"></span>
      <span id="overall-verdict" class="verdict-badge"></span>
    </div>
  </header>

  <main id="main">
    <div id="loading">Loading review data&hellip;</div>
    <div id="groups-container" class="hidden"></div>

    <section id="uncovered-section" class="hidden">
      <h2>Uncovered Files</h2>
      <p class="muted">Files changed but not covered by any intent manifest. Consider running reconstruction.</p>
      <ul id="uncovered-list"></ul>
    </section>

    <section id="questions-section" class="hidden">
      <h2>Open Questions</h2>
      <div id="questions-list"></div>
    </section>

    <section id="negative-space-section" class="hidden">
      <h2>Negative Space</h2>
      <p class="muted">Files intentionally not changed.</p>
      <ul id="negative-space-list"></ul>
    </section>
  </main>

  <div id="diff-modal" class="modal hidden">
    <div class="modal-content">
      <div class="modal-header">
        <span id="diff-title"></span>
        <button id="diff-close">&times;</button>
      </div>
      <pre id="diff-content" class="diff-viewer"></pre>
    </div>
  </div>

  <script src="/app.js"></script>
</body>
</html>
